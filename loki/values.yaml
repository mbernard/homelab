deploymentMode: SimpleScalable

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 2
  storage:
    type: s3
    bucketNames:
      chunks: loki-chunks
      ruler: loki-ruler
      admin: loki-admin
    s3:
      endpoint: http://loki-minio.loki.svc:9000
      accessKeyId: enterprise-logs
      secretAccessKey: supersecret
      s3ForcePathStyle: true
      insecure: true
  schemaConfig:
    configs:
    - from: "2024-04-01"
      store: tsdb
      object_store: s3
      schema: v13
      index:
        prefix: loki_index_
        period: 24h
  limits_config:
    allow_structured_metadata: true
    volume_enabled: true
  pattern_ingester:
    enabled: true

# MinIO on TrueNAS iSCSI — large, cheap object storage
minio:
  enabled: true
  persistence:
    storageClass: truenas-iscsi
    size: 50Gi

# write + backend on Longhorn — low-latency, HA block storage for WAL & index
write:
  replicas: 2
  persistence:
    enabled: true
    storageClass: longhorn
    size: 10Gi
  resources:
    limits:
      cpu: 500m
      memory: 2Gi
    requests:
      cpu: 250m
      memory: 1Gi

read:
  replicas: 2
  persistence:
    enabled: false # stateless, no PVC needed

backend:
  replicas: 2
  persistence:
    enabled: true
    storageClass: longhorn
    size: 10Gi

singleBinary:
  replicas: 0
