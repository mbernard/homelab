loki:
  # 1. This block satisfies the "Please define loki.storage.bucketNames.chunks" error
  storage:
    type: filesystem
    bucketNames:
      chunks: chunks
      ruler: ruler
      admin: admin
    filesystem:
      chunks_directory: /var/loki/chunks
      rules_directory: /var/loki/rules

  # 2. Schema must be nested under 'loki' in version 9.5.0+
  schemaConfig:
    configs:
    - from: "2020-10-24"
      store: tsdb # Recommended for 3.0+, but boltdb-shipper works for legacy
      object_store: filesystem
      schema: v11
      index:
        prefix: index_
        period: 24h

# 3. Component settings for 'Simple Scalable' mode
# In 9.5.0, 'write' replaces the old 'ingester' block for resources/replicas
write:
  replicas: 2
  persistence:
    enabled: true
    storageClass: microk8s-hostpath
    size: 20Gi
  resources:
    limits:
      cpu: 500m
      memory: 2Gi
    requests:
      cpu: 250m
      memory: 1Gi

read:
  replicas: 1
  persistence:
    enabled: true
    storageClass: microk8s-hostpath

backend:
  replicas: 1
  persistence:
    enabled: true
    storageClass: microk8s-hostpath
