persistence:
  enabled: true
  storageClassName: microk8s-hostpath
  size: 50Gi

resources:
  limits:
    cpu: 500m
    memory: 2Gi
  requests:
    cpu: 250m
    memory: 1Gi

ingester:
  replicas: 2
  persistence:
    enabled: true
    storageClassName: microk8s-hostpath
    size: 20Gi

schemaConfig:
  configs:
    - from: 2020-10-24
      store: boltdb-shipper
      object_store: filesystem
      schema: v11
      index:
        prefix: index_
        period: 24h

storage:
  filesystem:
    directory: /data/loki