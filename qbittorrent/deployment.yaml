apiVersion: apps/v1
kind: Deployment
metadata:
  name: qbittorrent
  namespace: qbittorrent
  annotations:
    keel.sh/policy: regex
    keel.sh/trigger: poll
    keel.sh/pollSchedule: "@every 1h"
    keel.sh/match: '^release-.*-linux-amd64$'
    keel.sh/approvals: "1"
    keel.sh/match-tag: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      run: qbittorrent
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        run: qbittorrent
    spec:
      containers:
      # === Container 1: Gluetun VPN Gateway ===
      - name: gluetun
        image: ghcr.io/qdm12/gluetun:latest
        imagePullPolicy: Always
        securityContext:
          capabilities:
            add: 
            - NET_ADMIN
          privileged: true
        envFrom:
        - configMapRef:
            name: env-vars
        env:
          - name: WIREGUARD_PRIVATE_KEY
            valueFrom:
              secretKeyRef:
                name: azurekv-secrets
                key: proton-vpn-private-key
        ports:
        - containerPort: 8080
          name: web-ui
        - containerPort: 28601
          name: seeding
        - containerPort: 5010
          name: mousehole
        volumeMounts:
        - mountPath: /gluetun
          name: gluetun-config
        - name: host-tun
          mountPath: /dev/net/tun

      # === Container 2: qBittorrent (Secured by Gluetun) ===
      - name: qbittorrent
        image: ghcr.io/hotio/qbittorrent:latest
        imagePullPolicy: Always
        env:
          - name: WEBUI_PORT
            value: "8080"
        volumeMounts:
        - mountPath: /data/torrents
          name: data
          subPath: torrents
        - mountPath: /etc/localtime
          name: tz
          readOnly: true
        - mountPath: /config
          name: qbittorrent-vol
        - mountPath: /config/data/BT_backup
          name: data
          subPath: BT_backup
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 1000m
            memory: 2Gi

      # === Container 3: Port Sync Sidecar ===
      # This ultra-lightweight process watches Gluetun's port file and pushes changes to qBittorrent
      - name: port-sync
        image: ghcr.io/hononeko/qbit-gluetun-sync:latest
        env:
          - name: QBIT_ADDR
            value: "http://localhost:8080"
          - name: PORT_FILE
            value: "/gluetun/forwarded_port"
        volumeMounts:
        - mountPath: /gluetun
          name: gluetun-config
          readOnly: true

      # === Container 4: MouseHole ===
      - name: mousehole
        image: tmmrtn/mousehole:latest
        imagePullPolicy: Always
        env:
          - name: PORT
            value: "5010"
          - name: MOUSEHOLE_AUTH_PASSWORD
            valueFrom:
              secretKeyRef:
                name: azurekv-secrets
                key: mousehole-password
        volumeMounts:
        - name: mousehole
          mountPath: /var/lib/mousehole
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 1000m
            memory: 2Gi
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: qbittorrent-nfs-pvc
      - name: tz
        hostPath:
          path: /etc/localtime
      - name: qbittorrent-vol
        persistentVolumeClaim:
          claimName: qbittorrent-pvc
      - name: gluetun-config
        emptyDir: {}
      - name: host-tun
        hostPath:
          path: /dev/net/tun
          type: CharDevice
      - name: mousehole
        persistentVolumeClaim:
          claimName: mousehole-pvc