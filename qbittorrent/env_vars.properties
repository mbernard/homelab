TZ=America/Montreal
VPN_ENABLED=true
VPN_TYPE=wireguard
VPN_SERVICE_PROVIDER=protonvpn

# 1. Target the US Region
SERVER_COUNTRIES=United States

# 2. Port Forwarding settings
VPN_PORT_FORWARDING=on
VPN_PORT_FORWARDING_PROVIDER=protonvpn

# 3. Automate qBittorrent Port Syncing
# This tells Gluetun to automatically push the dynamically assigned Proton port straight to qBittorrent's API
VPN_PORT_FORWARDING_UP_COMMAND=/bin/sh -c 'wget -O- -nv --retry-connrefused --post-data "json={\"listen_port\":{{PORT}},\"random_port\":false,\"upnp\\\":false}" http://127.0.0.1:8080/api/v2/app/setPreferences'

# 4. Your local LAN rule
FIREWALL_OUTBOUND_SUBNETS=192.168.10.0/24