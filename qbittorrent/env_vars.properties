TZ=America/Montreal
VPN_ENABLED=true
VPN_TYPE=wireguard
VPN_SERVICE_PROVIDER=protonvpn

# 1. Target the US Region
SERVER_COUNTRIES=United States,Canada

# 2. Port Forwarding settings
VPN_PORT_FORWARDING=on
VPN_PORT_FORWARDING_PROVIDER=protonvpn
PROTONVPN_PORT_FORWARDING_ONLY=no

# 3. Automate qBittorrent Port Syncing
VPN_PORT_FORWARDING_STATUS_FILE=/gluetun/forwarded_port

# 4. Your local LAN rule
FIREWALL_OUTBOUND_SUBNETS=192.168.10.0/24
FIREWALL_INPUT_PORTS=8080
DOT=off