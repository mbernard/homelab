apiVersion: apps/v1
kind: Deployment
metadata:
  name: prowlarr
  namespace: prowlarr
spec:
  replicas: 1
  selector:
    matchLabels:
      run: prowlarr
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        run: prowlarr
    spec:
      containers:
      - envFrom:
        - configMapRef:
            name: env-vars
        image: ghcr.io/hotio/prowlarr:release-2.3.0.5236
        name: prowlarr
        ports:
        - containerPort: 9696
        volumeMounts:
        - mountPath: /etc/localtime
          name: tz
          readOnly: true
        - mountPath: /config
          name: prowlarr-vol
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 1000m
            memory: 1Gi
        securityContext:
          capabilities:
            drop:
            - ALL
        livenessProbe:
          tcpSocket:
            port: 9696
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          tcpSocket:
            port: 9696
          initialDelaySeconds: 5
          periodSeconds: 10
      volumes:
      - hostPath:
          path: /etc/localtime
        name: tz
      - name: prowlarr-vol
        persistentVolumeClaim:
          claimName: prowlarr-pvc
