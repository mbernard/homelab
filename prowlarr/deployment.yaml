apiVersion: apps/v1
kind: Deployment
metadata:
  name: prowlarr
  namespace: prowlarr
  annotations:
    keel.sh/policy: regex
    keel.sh/trigger: poll
    keel.sh/pollSchedule: "@every 1h"
    keel.sh/match: '^release-.*-linux-amd64$'
spec:
  replicas: 1
  selector:
    matchLabels:
      run: prowlarr
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        run: prowlarr
    spec:
      containers:
      - envFrom:
        - configMapRef:
            name: env-vars
        image: ghcr.io/hotio/prowlarr:latest
        name: prowlarr
        ports:
        - containerPort: 9696
        volumeMounts:
        - mountPath: /etc/localtime
          name: tz
          readOnly: true
        - mountPath: /config
          name: prowlarr-vol
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 1000m
            memory: 1Gi
        livenessProbe:
          tcpSocket:
            port: 9696
          initialDelaySeconds: 60
          periodSeconds: 20
        readinessProbe:
          tcpSocket:
            port: 9696
          initialDelaySeconds: 30
          periodSeconds: 10
      volumes:
      - hostPath:
          path: /etc/localtime
        name: tz
      - name: prowlarr-vol
        persistentVolumeClaim:
          claimName: prowlarr-pvc
