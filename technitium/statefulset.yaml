apiVersion: apps/v1
kind: StatefulSet
metadata:
  labels:
    app: technitium
  name: technitium
  namespace: technitium
spec:
  replicas: 3
  selector:
    matchLabels:
      app: technitium
  template:
    metadata:
      labels:
        app: technitium
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
              - key: "app"
                operator: In
                values:
                - technitium
            topologyKey: "kubernetes.io/hostname"
      containers:
      - image: technitium/dns-server:15.2.0
        imagePullPolicy: IfNotPresent
        env:
        # 1. Point Technitium to the exact file path inside the volume
        - name: TECHNITIUM_DNS_SERVER_WEB_SERVICE_TLS_CERTIFICATE_FILE_PATH
          value: "/etc/technitium-certs/technitium"
        # 2. Provide the password you used when generating the PFX file
        - name: TECHNITIUM_DNS_SERVER_WEB_SERVICE_TLS_CERTIFICATE_PASSWORD
          value: "dns" 
        - name: TECHNITIUM_DNS_SERVER_WEB_SERVICE_ENABLE_TLS
          value: "true"
        name: technitium
        ports:
        - containerPort: 53
          name: dns-tcp
          protocol: TCP
        - containerPort: 53
          name: dns-udp
          protocol: UDP
        - containerPort: 5380
          name: web
          protocol: TCP
        - containerPort: 53443
          name: cluster
          protocol: TCP
        volumeMounts:
        - mountPath: /etc/dns
          name: etc-pvc
        - name: cert-volume
          mountPath: "/etc/technitium-certs"
          readOnly: true
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          tcpSocket:
            port: 5380
          initialDelaySeconds: 60
          periodSeconds: 20
        readinessProbe:
          tcpSocket:
            port: 5380
          initialDelaySeconds: 30
          periodSeconds: 10
      volumes:
      - name: cert-volume
        secret:
          secretName:  azurekv-secrets
          items:
          # This maps the key "technitium" to a clear filename
          - key: technitium
            path: technitium
  volumeClaimTemplates:
  - metadata:
      name: etc-pvc
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 5Gi
