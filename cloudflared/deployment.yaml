# based on https://developers.cloudflare.com/cloudflare-one/tutorials/many-cfd-one-tunnel/
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared
  namespace: cloudflared
  annotations:
    keel.sh/policy: force
    keel.sh/trigger: poll
    keel.sh/pollSchedule: "@every 1h"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cloudflared
  template:
    metadata:
      labels:
        app: cloudflared
    spec:
      containers:
      - image: cloudflare/cloudflared:latest
        name: cloudflared
        args:
          - tunnel
          - --no-autoupdate
          - --loglevel
          - info
          - --metrics
          - 0.0.0.0:2000
          - run
          - --protocol
          - http2
          - --http2-origin
        livenessProbe:
          failureThreshold: 5
          httpGet:
            path: /ready
            port: 2000
          initialDelaySeconds: 60
          periodSeconds: 10
        env:
        - name: TUNNEL_TOKEN
          valueFrom:
            secretKeyRef:
              key: cloudflare-tunnel-token
              name: azurekv-secrets
        volumeMounts:
        - mountPath: /etc/cloudflared/config
          name: config
          readOnly: true
        - mountPath: /etc/cloudflared/creds
          name: creds
          readOnly: true
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            cpu: 250m
            memory: 256Mi
      volumes:
      - name: creds
        secret:
          secretName: azurekv-secrets
      - name: config
        configMap:
          name: cloudflared
          items:
          - key: config.yaml
            path: config.yaml