apiVersion: apps/v1
kind: Deployment
metadata:
  name: audiobookshelf
  namespace: audiobookshelf
  annotations:
    keel.sh/policy: force
    keel.sh/trigger: poll
    keel.sh/match-tag: "true"
    keel.sh/pollSchedule: "@every 1h"
spec:
  replicas: 1
  selector:
    matchLabels:
      run: audiobookshelf
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        run: audiobookshelf
    spec:
      containers:
      - envFrom:
        - configMapRef:
            name: env-vars
        image: ghcr.io/advplyr/audiobookshelf:latest
        imagePullPolicy: Always
        name: audiobookshelf
        ports:
        - containerPort: 80
        volumeMounts:
        - mountPath: /etc/localtime
          name: tz
          readOnly: true
        - mountPath: /config
          name: audiobookshelf-vol
          subPath: config
        - mountPath: /metadata
          name: audiobookshelf-vol
          subPath: metadata
        - mountPath: /audiobooks
          name: data
          subPath: media/audiobooks
        - mountPath: /podcasts
          name: data
          subPath: media/podcasts
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 1000m
            memory: 1Gi
        livenessProbe:
          tcpSocket:
            port: 80
          initialDelaySeconds: 60
          periodSeconds: 20
        readinessProbe:
          tcpSocket:
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: data-nfs-pvc
      - hostPath:
          path: /etc/localtime
        name: tz
      - name: audiobookshelf-vol
        persistentVolumeClaim:
          claimName: audiobookshelf-pvc
