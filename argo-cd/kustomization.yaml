apiVersion: kustomize.config.k8s.io/v1beta1
configMapGenerator:
- files:
  - cmp-plugin/avp-helm.yaml
  - cmp-plugin/avp-kustomize.yaml
  - cmp-plugin/avp.yaml
  name: cmp-plugin
kind: Kustomization

namespace: argocd

patches:
- path: argocd-cm.yaml
- path: argocd-rbac-cm.yaml
- path: clusterrole.yaml
- path: argocd-cmd-params-cm.yaml
- path: argocd-repo-server.yaml
- path: argocd-redis-ha-haproxy.yaml

# https://github.com/argoproj/argo-cd/tree/master/manifests/ha
resources:
- https://raw.githubusercontent.com/argoproj/argo-cd/refs/tags/v3.4.3/manifests/ha/install.yaml
- repo.yaml
- repo-server-rbac.yaml

images:
- name: quay.io/argoproj/argocd
  newTag: latest

commonAnnotations:
  keel.sh/policy: force
  keel.sh/trigger: poll
  keel.sh/pollSchedule: "@every 1h"
  keel.sh/approvals: "1"

