apiVersion: apps/v1
kind: Deployment
metadata:
  name: calibre
  namespace: calibre
  annotations:
    keel.sh/policy: force
    keel.sh/trigger: poll
    keel.sh/pollSchedule: "@every 1h"
    keel.sh/match-tag: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      run: calibre
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        run: calibre
    spec:
      containers:
      - envFrom:
        - configMapRef:
            name: env-vars
        image: linuxserver/calibre:latest
        name: calibre
        ports:
        - containerPort: 8080
        - containerPort: 8081
        volumeMounts:
        - mountPath: /etc/localtime
          name: tz
          readOnly: true
        - mountPath: /config
          name: calibre-vol
        - mountPath: /data
          name: data
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 1000m
            memory: 1Gi
        livenessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 20
        readinessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
      volumes:
      - hostPath:
          path: /etc/localtime
        name: tz
      - name: calibre-vol
        persistentVolumeClaim:
          claimName: calibre-pvc
      - name: data
        persistentVolumeClaim:
          claimName: calibre-nfs-pvc
