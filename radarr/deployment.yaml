apiVersion: apps/v1
kind: Deployment
metadata:
  name: radarr
  namespace: radarr
spec:
  replicas: 1
  selector:
    matchLabels:
      run: radarr
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        run: radarr
    spec:
      containers:
      - envFrom:
        - configMapRef:
            name: env-vars
        image: ghcr.io/hotio/radarr:release-6.1.1.10360
        name: radarr
        ports:
        - containerPort: 7878
        volumeMounts:
        - mountPath: /etc/localtime
          name: tz
          readOnly: true
        - mountPath: /config
          name: radarr-vol
        - mountPath: /data
          name: data
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 1000m
            memory: 1Gi
        livenessProbe:
          tcpSocket:
            port: 7878
          initialDelaySeconds: 60
          periodSeconds: 20
        readinessProbe:
          tcpSocket:
            port: 7878
          initialDelaySeconds: 30
          periodSeconds: 10
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: radarr-nfs-pvc
      - hostPath:
          path: /etc/localtime
        name: tz
      - name: radarr-vol
        persistentVolumeClaim:
          claimName: radarr-pvc
