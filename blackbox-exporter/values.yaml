replicas: 1

serviceMonitor:
  enabled: true
  namespace: blackbox-exporter
  additionalLabels:
    release: kube-prometheus-stack

config:
  modules:
    http_2xx:
      prober: http
      timeout: 5s
      http:
        valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
        valid_status_codes: []  # Defaults to 2xx
        method: GET
        headers:
          User-Agent: blackbox-exporter
    tcp_connect:
      prober: tcp
      timeout: 5s
    icmp:
      prober: icmp
      timeout: 5s

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 100m
    memory: 128Mi