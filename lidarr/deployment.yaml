apiVersion: apps/v1
kind: Deployment
metadata:
  name: lidarr
  namespace: lidarr
spec:
  replicas: 1
  selector:
    matchLabels:
      run: lidarr
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        run: lidarr
    spec:
      containers:
      - envFrom:
        - configMapRef:
            name: env-vars
        image: ghcr.io/hotio/lidarr:release-3.1.0.4875
        name: lidarr
        ports:
        - containerPort: 8686
        volumeMounts:
        - mountPath: /etc/localtime
          name: tz
          readOnly: true
        - mountPath: /config
          name: lidarr-vol
        - mountPath: /data
          name: data
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 1000m
            memory: 1Gi
        livenessProbe:
          tcpSocket:
            port: 8686
          initialDelaySeconds: 60
          periodSeconds: 20
        readinessProbe:
          tcpSocket:
            port: 8686
          initialDelaySeconds: 30
          periodSeconds: 10
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: lidarr-nfs-pvc
      - hostPath:
          path: /etc/localtime
        name: tz
      - name: lidarr-vol
        persistentVolumeClaim:
          claimName: lidarr-pvc
