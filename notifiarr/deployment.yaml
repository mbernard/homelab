apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: notifiarr
  namespace: notifiarr
  annotations:
    keel.sh/policy: force
    keel.sh/trigger: poll
    keel.sh/pollSchedule: "@every 1h"
    keel.sh/match-tag: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      run: notifiarr
  template:
    metadata:
      labels:
        run: notifiarr
    spec:
      containers:
      - envFrom:
        - configMapRef:
            name: env-vars
        image: golift/notifiarr:latest
        name: notifiarr
        ports:
        - containerPort: 5454
        volumeMounts:
        - mountPath: /etc/localtime
          name: tz
          readOnly: true
        - mountPath: /config
          name: notifiarr-vol
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            cpu: 250m
            memory: 256Mi
        livenessProbe:
          tcpSocket:
            port: 5454
          initialDelaySeconds: 60
          periodSeconds: 20
        readinessProbe:
          tcpSocket:
            port: 5454
          initialDelaySeconds: 30
          periodSeconds: 10
      volumes:
      - hostPath:
          path: /etc/localtime
        name: tz
      - name: notifiarr-vol
        persistentVolumeClaim:
          claimName: notifiarr-pvc
