apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: keel
  namespace: argocd
spec:
  project: default
  sources:
  - repoURL: 'https://charts.keel.sh'
    chart: keel
    targetRevision: 1.2.0
    plugin:
        name: argocd-vault-plugin-helm
        env:
          # This variable replaces ${ARGOCD_ENV_HELM_ARGS} in your sidecar script
          - name: ARGOCD_ENV_HELM_ARGS
            value: "-f $values/keel/values.yaml"
  - ref: values
    repoURL: https://github.com/mbernard/homelab.git
    targetRevision: HEAD
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: keel
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
