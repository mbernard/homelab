apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  namespace: argocd
spec:
  destination:
    namespace: loki
    server: https://kubernetes.default.svc
  project: default
  sources:
  - repoURL: ghcr.io/grafana-community/helm-charts
    chart: loki
    targetRevision: 9.5.13
    helm:
      releaseName: loki
      valueFiles:
      - $values/loki/values.yaml
  - ref: values
    repoURL: https://github.com/mbernard/homelab.git
    targetRevision: HEAD
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true
