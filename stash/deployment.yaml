apiVersion: apps/v1
kind: Deployment
metadata:
  name: stash-server
  namespace: stash
  annotations:
    keel.sh/policy: force
    keel.sh/trigger: poll
    keel.sh/pollSchedule: "@every 1h"
spec:
  replicas: 1
  selector:
    matchLabels:
      run: stash
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        run: stash
    spec:
      containers:
      - env:
        - name: STASH_STASH
          value: /data/
        - name: STASH_GENERATED
          value: /generated/
        - name: STASH_METADATA
          value: /metadata/
        - name: STASH_CACHE
          value: /cache/
        - name: STASH_PORT
          value: '9999'
        - name: NVIDIA_VISIBLE_DEVICES
          value: all
        - name: NVIDIA_DRIVER_CAPABILITIES
          value: compute,video,utility
        - name: MIGRATE
          value: "true"
        image: ghcr.io/rufftruffles/stash-nvenc-patches:latest
        imagePullPolicy: Always
        name: stash
        ports:
        - containerPort: 9999
        volumeMounts:
        - mountPath: /etc/localtime
          name: tz
          readOnly: true
        - mountPath: /data
          ## Point this at your collection.
          name: nfs-private
          subPath: Porn
        - mountPath: /config
          ## Keep configs, scrapers, and plugins here.
          name: stash-vol
          subPath: config
        - mountPath: /root/.stash
          ## Keep configs, scrapers, and plugins here.
          name: stash-vol
          subPath: root
        - mountPath: /metadata
          ## This is where your stash's metadata lives
          name: stash-vol
          subPath: metadata
        - mountPath: /cache
          ## Any other cache content.
          name: stash-vol
          subPath: cache
        - mountPath: /blobs
          ## Where to store binary blob data (scene covers, images)
          name: stash-vol
          subPath: blobs
        - mountPath: /generated
          ## Where to store generated content (screenshots,previews,transcodes,sprites)
          name: nfs-private
          subPath: stash/generated
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 1000m
            memory: 1Gi
        livenessProbe:
          tcpSocket:
            port: 9999
          initialDelaySeconds: 60
          periodSeconds: 20
        readinessProbe:
          tcpSocket:
            port: 9999
          initialDelaySeconds: 30
          periodSeconds: 10
      nodeName: spartan
      runtimeClassName: nvidia
      volumes:
      - name: nfs-private
        persistentVolumeClaim:
          claimName: private-nfs-pvc
      - hostPath:
          path: /etc/localtime
        name: tz
      - name: stash-vol
        persistentVolumeClaim:
          claimName: stash-pvc
