apiVersion: apps/v1
kind: Deployment
metadata:
  name: bookshelf
  namespace: bookshelf
  annotations:
    keel.sh/policy: force
    keel.sh/trigger: poll
    keel.sh/pollSchedule: "@every 1h"
spec:
  replicas: 1
  selector:
    matchLabels:
      run: bookshelf
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        run: bookshelf
    spec:
      containers:
      - envFrom:
        - configMapRef:
            name: env-vars
        image: ghcr.io/pennydreadful/bookshelf:softcover
        name: bookshelf
        ports:
        - containerPort: 8787
        volumeMounts:
        - mountPath: /etc/localtime
          name: tz
          readOnly: true
        - mountPath: /config
          name: bookshelf-vol
        - mountPath: /data
          name: data
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            cpu: 250m
            memory: 256Mi
        livenessProbe:
          tcpSocket:
            port: 8787
          initialDelaySeconds: 60
          periodSeconds: 20
        readinessProbe:
          tcpSocket:
            port: 8787
          initialDelaySeconds: 30
          periodSeconds: 10
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: bookshelf-nfs-pvc
      - hostPath:
          path: /etc/localtime
        name: tz
      - name: bookshelf-vol
        persistentVolumeClaim:
          claimName: bookshelf-pvc
