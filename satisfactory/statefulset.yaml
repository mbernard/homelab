apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: satisfactory
spec:
  replicas: 1
  selector:
    matchLabels:
      app: satisfactory
  serviceName: satisfactory
  template:
    metadata:
      labels:
        app: satisfactory
    spec:
      containers:
      - env:
        - name: DEBUG
          value: "false"
        - name: MAXPLAYERS
          value: "8"
        - name: PGID
          value: "1000"
        - name: PUID
          value: "1000"
        - name: SKIPUPDATE
          value: "false"
        - name: STEAMBETA
          value: "false"
        image: wolveix/satisfactory-server:v1.9.10
        name: satisfactory
        ports:
        - containerPort: 7777
          name: api
          protocol: TCP
        - containerPort: 7777
          name: game
          protocol: UDP
        - containerPort: 8888
          name: messaging
          protocol: TCP
        volumeMounts:
        - mountPath: /config
          name: games
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: 4000m
            memory: 4Gi
        livenessProbe:
          tcpSocket:
            port: 7777
          initialDelaySeconds: 180
          periodSeconds: 20
        readinessProbe:
          tcpSocket:
            port: 7777
          initialDelaySeconds: 90
          periodSeconds: 10
      volumes:
      - name: games
        persistentVolumeClaim:
          claimName: satisfactory-pvc
